<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markets</title>
    <script>
      fetch('/brand.json')
        .then(r => r.json())
        .then(b => {
          document.documentElement.style.setProperty('--primary-color', b.primaryColor || '#F97316');
          document.documentElement.style.setProperty('--accent-color', b.accentColor || '#3b82f6');
          document.title = b.siteName || 'Markets';
        })
        .catch(() => {
          document.documentElement.style.setProperty('--primary-color', '#F97316');
          document.documentElement.style.setProperty('--accent-color', '#3b82f6');
        });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
